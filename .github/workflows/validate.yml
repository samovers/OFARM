name: Validate repository

on:
  push:
  pull_request:

jobs:
  repository-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository validation suite
        run: python3 package_meta/tools/run_repository_validation_suite.py
