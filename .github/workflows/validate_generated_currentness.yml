name: Validate generated currentness

on:
  push:
  pull_request:

jobs:
  generated-currentness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check generated currentness
        run: python3 package_meta/tools/check_generated_currentness.py
